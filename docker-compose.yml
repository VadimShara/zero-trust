version: "3.9"

services:

  postgres:
    image: docker.io/library/postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_MULTIPLE_DATABASES: authdb,trustdb,keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init.sh:z
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: docker.io/library/redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  kafka:
    image: docker.io/confluentinc/cp-kafka:7.6.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 35UfHTSLQ6WIGj1ZJoAXxg
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    build:
      context: infra/keycloak
      dockerfile: Dockerfile
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: secret
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_SPI_EVENTS_LISTENER_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KC_SPI_EVENTS_LISTENER_KAFKA_TOPIC_EVENTS: keycloak.events
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:z
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      disable: true

  keycloak-bridge:
    build:
      context: .
      dockerfile: infra/keycloak-bridge/Dockerfile
    environment:
      KAFKA_BROKERS: kafka:9092
      KEYCLOAK_EVENTS_TOPIC: keycloak.events
      AUTH_SERVICE_URL: http://auth:8080
      TRUST_SERVICE_URL: http://trust:8080
    depends_on:
      kafka:
        condition: service_healthy
      auth:
        condition: service_started
      trust:
        condition: service_started

  opa:
    image: docker.io/openpolicyagent/opa:latest
    command: run --server --watch --addr=0.0.0.0:8181 /policies
    volumes:
      - ./toolkit/policies:/policies:z
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "/opa", "eval", "--format", "raw", "true"]
      interval: 5s

  auth:
    build:
      context: .
      dockerfile: auth/Dockerfile
    environment:
      POSTGRES_DSN: postgres://auth:secret@postgres/authdb?sslmode=disable
      MIGRATIONS_PATH: migrations
      LOG_LEVEL: info
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy

  trust:
    build:
      context: .
      dockerfile: trust/Dockerfile
    environment:
      POSTGRES_DSN: postgres://trust:secret@postgres/trustdb?sslmode=disable
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      IP_REPUTATION_API_KEY: ${IP_REPUTATION_API_KEY:-}
      MIGRATIONS_PATH: migrations
      LOG_LEVEL: info
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  token:
    build:
      context: .
      dockerfile: token/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      TRUST_SERVICE_URL: http://trust:8080
      LOG_LEVEL: info
    expose:
      - "8080"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      trust:
        condition: service_started

  idpadapter:
    build:
      context: .
      dockerfile: idpadapter/Dockerfile
    environment:
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/demo
      KEYCLOAK_CLIENT_ID: zero-trust-app
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      IDPADAPTER_CALLBACK_URL: ${IDPADAPTER_CALLBACK_URL:-http://localhost:8090/idp/callback}
      AUTH_SERVICE_URL: http://auth:8080
      GATEWAY_PRIVATE_URL: http://gateway:8081
      GATEWAY_PUBLIC_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:3000}
      TRUST_SERVICE_URL: http://trust:8080
      KEYCLOAK_REALM: demo
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    ports:
      - "8090:8080"   
    depends_on:
      keycloak:
        condition: service_started
      auth:
        condition: service_started
      redis:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      CLIENT_ID: ${GATEWAY_CLIENT_ID}
      CLIENT_SECRET: ${GATEWAY_CLIENT_SECRET}
      REDIS_URL: redis://redis:6379
      OPA_URL: http://opa:8181
      TOKEN_SERVICE_URL: http://token:8080
      TRUST_SERVICE_URL: http://trust:8080
      IDPADAPTER_URL: http://idpadapter:8080
      AUTH_SERVICE_URL: http://auth:8080
      AUDIT_SERVICE_URL: http://audit:8080
      GATEWAY_PUBLIC_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:3000}
      CLIENT_CALLBACK_URL: ${CLIENT_CALLBACK_URL:-http://localhost:4000/callback}
      KAFKA_BROKERS: kafka:9092
      LOG_LEVEL: info
    expose:
      - "3000"
      - "8081"
    depends_on:
      opa:
        condition: service_started
      token:
        condition: service_started
      trust:
        condition: service_started
      idpadapter:
        condition: service_started
      auth:
        condition: service_started
      redis:
        condition: service_healthy

  audit:
    build:
      context: .
      dockerfile: audit/Dockerfile
    environment:
      KAFKA_BROKERS: kafka:9092
      POSTGRES_DSN: postgres://audit:secret@postgres/authdb?sslmode=disable
      MIGRATIONS_PATH: migrations
      LOG_LEVEL: info
    expose:
      - "8080"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  client-app:
    build:
      context: .
      dockerfile: client-app/Dockerfile
    environment:
      GATEWAY_URL: http://gateway:3000
      GATEWAY_PUBLIC_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:3000}
      TRUST_URL: http://trust:8080
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      CLIENT_ID: ${GATEWAY_CLIENT_ID}
      CLIENT_SECRET: ${GATEWAY_CLIENT_SECRET}
      PORT: "4000"
    expose:
      - "4000"
    depends_on:
      gateway:
        condition: service_started
      trust:
        condition: service_started

  nginx:
    image: docker.io/library/nginx:1.25-alpine
    volumes:
      - ./infra/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:z
    ports:
      - "3000:3000" 
      - "4000:4000"   
    depends_on:
      - gateway
      - client-app

  prometheus:
    image: docker.io/prom/prometheus:v2.52.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:z
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      gateway:
        condition: service_started
      token:
        condition: service_started

  grafana:
    image: docker.io/grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:z
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:z
      - grafana_data:/var/lib/grafana
    ports:
      - "9091:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
